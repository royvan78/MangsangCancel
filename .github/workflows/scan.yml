name: 망상 방 현황 스캔

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests pycryptodome
      - name: 방 현황 스캔
        env:
          CK_ID_1: ${{ secrets.CK_ID_1 }}
          CK_PW:   ${{ secrets.CK_PW }}
        run: python scan.py
